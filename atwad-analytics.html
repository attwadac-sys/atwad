<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أطواد - التحليلات المتقدمة</title>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root{--deep:#0C3B5E;--sky:#0EA5E9;--ice:#E8F4FD;--frost:#F0F9FF;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--purple:#8B5CF6;--slate:#334155;--mist:#94A3B8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:#F1F5F9;color:var(--slate);}
.header{background:linear-gradient(135deg,var(--deep),#0e5fa8,var(--sky));padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.header h1{color:#fff;font-size:20px;font-weight:900;}
.header p{color:rgba(255,255,255,.7);font-size:12px;}
.back-btn{padding:8px 14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--ice);position:sticky;top:0;z-index:100;}
.tab{flex:1;padding:14px;text-align:center;border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--mist);border-bottom:3px solid transparent;transition:all .2s;}
.tab.active{color:var(--sky);border-bottom-color:var(--sky);}
.tab-content{display:none;padding:16px;}
.tab-content.active{display:block;}

/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;}
.kpi{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;}
.kpi .num{font-size:28px;font-weight:900;color:var(--deep);}
.kpi .lbl{font-size:12px;color:var(--mist);margin-top:4px;}
.kpi.blue{border-top:3px solid var(--sky);}
.kpi.green{border-top:3px solid var(--success);}
.kpi.orange{border-top:3px solid var(--warning);}
.kpi.purple{border-top:3px solid var(--purple);}

/* MAP */
.map-container{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px;}
.map-header{background:var(--deep);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.map-header h3{font-size:15px;font-weight:700;}
#mapFrame{width:100%;height:400px;border:none;}
.map-list{padding:12px;}
.map-appt{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:var(--frost);margin-bottom:8px;cursor:pointer;}
.map-appt:hover{background:var(--ice);}
.map-num{width:28px;height:28px;border-radius:50%;background:var(--sky);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.map-info{flex:1;}
.map-name{font-size:13px;font-weight:700;color:var(--deep);}
.map-sub{font-size:11px;color:var(--mist);}
.map-time{font-size:12px;font-weight:700;color:var(--sky);}

/* TECH PERFORMANCE */
.tech-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;}
.tech-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.tech-avatar{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;}
.tech-name{font-size:16px;font-weight:800;color:var(--deep);}
.tech-role{font-size:12px;color:var(--mist);}
.tech-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.tech-stat{text-align:center;background:var(--frost);border-radius:10px;padding:10px;}
.tech-stat .n{font-size:20px;font-weight:900;color:var(--deep);}
.tech-stat .l{font-size:11px;color:var(--mist);}
.progress-bar{background:#E2E8F0;border-radius:20px;height:6px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:20px;transition:width .5s;}
.stars{color:#F59E0B;font-size:14px;margin-top:4px;}

/* LOYALTY */
.loyalty-search{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;}
.loyalty-search input{width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;outline:none;}
.loyalty-search input:focus{border-color:var(--sky);}
.client-loyalty{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:10px;}
.loyalty-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.loyalty-name{font-size:15px;font-weight:800;color:var(--deep);}
.loyalty-tier{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.tier-bronze{background:#FEF3C7;color:#92400E;}
.tier-silver{background:#F1F5F9;color:#475569;}
.tier-gold{background:#FEF9C3;color:#854D0E;}
.tier-platinum{background:#EDE9FE;color:#5B21B6;}
.points-display{text-align:center;background:linear-gradient(135deg,var(--deep),var(--sky));border-radius:12px;padding:14px;color:#fff;margin-bottom:12px;}
.points-num{font-size:32px;font-weight:900;}
.points-lbl{font-size:12px;opacity:.8;}
.loyalty-history{font-size:12px;color:var(--mist);}
.history-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #E2E8F0;}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--mist);}
.spinner{width:32px;height:32px;border:3px solid var(--ice);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--mist);}
.section-title{font-size:15px;font-weight:800;color:var(--deep);margin-bottom:12px;}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 التحليلات المتقدمة</h1>
    <p>خريطة المواعيد • أداء الفنيين • ولاء العملاء</p>
  </div>
  <a href="index.html" class="back-btn">← الرئيسية</a>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('map',this)">🗺️ خريطة</button>
  <button class="tab" onclick="switchTab('techs',this)">👷 الفنيون</button>
  <button class="tab" onclick="switchTab('loyalty',this)">⭐ الولاء</button>
</div>

<!-- TAB: MAP -->
<div class="tab-content active" id="tab-map">
  <div class="kpi-grid" id="mapKPIs">
    <div class="kpi blue"><div class="num" id="kpiTotal">0</div><div class="lbl">مواعيد اليوم</div></div>
    <div class="kpi green"><div class="num" id="kpiDone">0</div><div class="lbl">مكتملة</div></div>
    <div class="kpi orange"><div class="num" id="kpiPending">0</div><div class="lbl">في الانتظار</div></div>
    <div class="kpi purple"><div class="num" id="kpiTechs">3</div><div class="lbl">فنيون نشطون</div></div>
  </div>

  <div class="map-container">
    <div class="map-header">
      <h3>🗺️ مواعيد اليوم على الخريطة</h3>
      <span id="mapDate" style="font-size:11px;opacity:.7;"></span>
    </div>
    <iframe id="mapFrame" src="about:blank"></iframe>
    <div class="map-list" id="mapList">
      <div class="loading"><div class="spinner"></div><div>جاري تحميل المواعيد...</div></div>
    </div>
  </div>
</div>

<!-- TAB: TECH PERFORMANCE -->
<div class="tab-content" id="tab-techs">
  <p class="section-title">📈 أداء الفنيين — آخر 30 يوم</p>
  <div id="techCards">
    <div class="loading"><div class="spinner"></div><div>جاري التحميل...</div></div>
  </div>
</div>

<!-- TAB: LOYALTY -->
<div class="tab-content" id="tab-loyalty">
  <div class="loyalty-search">
    <input type="text" id="loyaltySearch" placeholder="🔍 ابحث باسم العميل أو رقمه..." oninput="searchLoyalty(this.value)">
  </div>
  <div id="loyaltyList">
    <div class="loading"><div class="spinner"></div><div>جاري تحميل بيانات الولاء...</div></div>
  </div>
</div>

<script>
// Firebase
var db = null;
try {
  firebase.initializeApp({databaseURL:"https://atwad-booking-default-rtdb.firebaseio.com"});
  db = firebase.database();
} catch(e){ console.error('Firebase initialization error:', e); }

var allAppts = [], allWOs = [], allClients = [];
var TECHS = { Abrar:'أحمد', 'أبرار':'أحمد', 'Abrar':'أحمد', Shoib:'شعيب', Suhail:'سهيل'};
var TECH_COLORS = {Abrar:'#0EA5E9', Shoib:'#10B981', Suhail:'#8B5CF6'};

// ===== تحميل البيانات =====
function loadAll() {
  if(!db) {
    console.error('Firebase not initialized — cannot load data');
    document.getElementById('mapList').innerHTML =
      '<div class="empty">⚠️ تعذّر الاتصال بقاعدة البيانات</div>';
    document.getElementById('techCards').innerHTML =
      '<div class="empty">⚠️ تعذّر الاتصال بقاعدة البيانات</div>';
    document.getElementById('loyaltyList').innerHTML =
      '<div class="empty">⚠️ تعذّر الاتصال بقاعدة البيانات</div>';
    return;
  }
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('mapDate').textContent = new Date().toLocaleDateString('ar-SA',{weekday:'long',month:'long',day:'numeric'});

  // تحميل المواعيد من appointments + bookings مع معالجة أخطاء واضحة
  var mapListEl = document.getElementById('mapList');
  db.ref('appointments').once('value').then(function(snap) {
    allAppts = [];
    snap.forEach(function(c){ allAppts.push(Object.assign({}, c.val(), {_key:c.key})); });
    return db.ref('bookings').once('value');
  }).then(function(snap2) {
    snap2.forEach(function(c){ allAppts.push(Object.assign({}, c.val(), {_key:c.key, _src:'booking'})); });
    renderMap(today);
  }).catch(function(e) {
    console.error('Firebase read error (appointments/bookings):', e);
    mapListEl.innerHTML = '<div class="empty">⚠️ تعذّر تحميل المواعيد، يرجى المحاولة مرة أخرى</div>';
  });

  // تحميل أوامر العمل
  db.ref('workOrders').once('value').then(function(snap) {
    allWOs = [];
    snap.forEach(function(c){ allWOs.push(Object.assign({}, c.val(), {_key:c.key})); });
    renderTechs();
  }).catch(function(e) {
    console.error('Firebase read error (workOrders):', e);
    document.getElementById('techCards').innerHTML =
      '<div class="empty">⚠️ تعذّر تحميل بيانات الفنيين، يرجى المحاولة مرة أخرى</div>';
  });

  // تحميل العملاء
  db.ref('customers').once('value').then(function(snap) {
    allClients = [];
    snap.forEach(function(c){ allClients.push(Object.assign({}, c.val(), {_key:c.key})); });
    renderLoyalty('');
  }).catch(function(e) {
    console.error('Firebase read error (customers):', e);
    document.getElementById('loyaltyList').innerHTML =
      '<div class="empty">⚠️ تعذّر تحميل بيانات العملاء، يرجى المحاولة مرة أخرى</div>';
  });
}

// ===== 🗺️ خريطة المواعيد =====
function renderMap(today) {
  var todayAppts = allAppts.filter(function(a){ return a.date === today; })
    .sort(function(a,b){ return (a.time||'').localeCompare(b.time||''); });

  // تحديث KPIs
  document.getElementById('kpiTotal').textContent = todayAppts.length;
  document.getElementById('kpiDone').textContent = todayAppts.filter(function(a){ return a.status==='done'; }).length;
  document.getElementById('kpiPending').textContent = todayAppts.filter(function(a){ return a.status==='pending'||a.status==='confirmed'; }).length;

  // بناء رابط الخريطة مع كل المواعيد
  var addresses = todayAppts.map(function(a){ return a.address||a.city||'جدة'; });
  var mapLinks = todayAppts.filter(function(a){ return a.mapsLink||a.address; });

  if(mapLinks.length > 0) {
    // خريطة Google Maps مع نقاط المسار
    var firstLink = mapLinks[0].mapsLink || ('https://maps.google.com?q='+encodeURIComponent(mapLinks[0].address||'جدة'));
    document.getElementById('mapFrame').src = 'https://maps.google.com/maps?q='+encodeURIComponent('جدة، المملكة العربية السعودية')+'&output=embed&z=12';
  } else {
    document.getElementById('mapFrame').src = 'https://maps.google.com/maps?q=جدة&output=embed&z=12';
  }

  // قائمة المواعيد
  var list = document.getElementById('mapList');
  if(todayAppts.length === 0) {
    list.innerHTML = '<div class="empty">📅 لا توجد مواعيد اليوم</div>';
    return;
  }

  list.innerHTML = '<p class="section-title" style="padding:8px 0 4px;">📋 قائمة المواعيد</p>' +
    todayAppts.map(function(a, idx) {
      var mapsUrl = a.mapsLink || ('https://maps.google.com?q='+encodeURIComponent(a.address||a.city||'جدة'));
      return '<div class="map-appt" onclick="window.open(\''+mapsUrl+'\',\'_blank\')">' +
        '<div class="map-num" style="background:'+( TECH_COLORS[a.tech]||'#0EA5E9')+'">'+((idx+1))+'</div>' +
        '<div class="map-info">' +
          '<div class="map-name">'+(a.client||'—')+'</div>' +
          '<div class="map-sub">🛠️ '+(a.service||'—')+' | 👷 '+(TECHS[a.tech]||a.tech||'—')+'</div>' +
          '<div class="map-sub">📍 '+(a.address||a.city||'جدة')+'</div>' +
        '</div>' +
        '<div class="map-time">⏰ '+(a.time||'—')+'</div>' +
        '</div>';
    }).join('');
}

// ===== 👷 أداء الفنيين =====
function renderTechs() {
  var cards = document.getElementById('techCards');
  var thirtyDaysAgo = new Date();
  thirtyDaysAgo.setDate(thirtyDaysAgo.getDate()-30);
  var since = thirtyDaysAgo.toISOString().split('T')[0];

  var techData = {};
  ['Abrar','Shoib','Suhail'].forEach(function(t) {
    techData[t] = {total:0, done:0, revenue:0, ratings:[], appts:0};
  });

  // من أوامر العمل
  allWOs.forEach(function(w) {
    if(!w.tech || !techData[w.tech]) return;
    if(w.date && w.date >= since) {
      techData[w.tech].total++;
      if(w.status==='done'||w.status==='invoiced') {
        techData[w.tech].done++;
        var price = parseFloat(w.price)||0;
        var parts = parseFloat(w.partsCost)||0;
        var disc = parseFloat(w.discount)||0;
        techData[w.tech].revenue += Math.max(0, price+parts-disc);
      }
      if(w.rating) techData[w.tech].ratings.push(parseFloat(w.rating));
    }
  });

  // من المواعيد
  allAppts.forEach(function(a) {
    if(!a.tech || !techData[a.tech]) return;
    if(a.date && a.date >= since) techData[a.tech].appts++;
  });

  cards.innerHTML = ['Abrar','Shoib','Suhail'].map(function(t) {
    var d = techData[t];
    var avgRating = d.ratings.length ? (d.ratings.reduce(function(s,r){return s+r;},0)/d.ratings.length).toFixed(1) : '—';
    var completionRate = d.total ? Math.round((d.done/d.total)*100) : 0;
    var stars = avgRating !== '—' ? '★'.repeat(Math.round(avgRating)) + '☆'.repeat(5-Math.round(avgRating)) : '—';
    return '<div class="tech-card">' +
      '<div class="tech-header">' +
        '<div class="tech-avatar" style="background:'+TECH_COLORS[t]+'">'+TECHS[t][0]+'</div>' +
        '<div><div class="tech-name">'+TECHS[t]+'</div><div class="tech-role">فني ميداني • آخر 30 يوم</div></div>' +
      '</div>' +
      '<div class="tech-stats">' +
        '<div class="tech-stat"><div class="n">'+d.appts+'</div><div class="l">المواعيد</div></div>' +
        '<div class="tech-stat"><div class="n">'+d.done+'</div><div class="l">المكتملة</div></div>' +
        '<div class="tech-stat"><div class="n">'+d.revenue.toLocaleString('ar')+'</div><div class="l">ريال</div></div>' +
      '</div>' +
      '<div style="margin-top:12px;">' +
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--mist);margin-bottom:4px;"><span>معدل الإنجاز</span><span>'+completionRate+'%</span></div>' +
        '<div class="progress-bar"><div class="progress-fill" style="width:'+completionRate+'%;background:'+TECH_COLORS[t]+'"></div></div>' +
      '</div>' +
      '<div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;">' +
        '<span style="font-size:12px;color:var(--mist);">متوسط التقييم</span>' +
        '<span style="color:#F59E0B;font-size:14px;">'+(avgRating!=='—'?stars+' '+avgRating:'لا توجد تقييمات')+'</span>' +
      '</div>' +
      '</div>';
  }).join('');
}

// ===== ⭐ برنامج ولاء العملاء =====
function calcPoints(client) {
  // حساب النقاط من أوامر العمل
  var clientWOs = allWOs.filter(function(w){
    return w.client && (w.client.includes(client.name)||w.phone===client.phone);
  });
  var points = 0;
  var history = [];
  clientWOs.forEach(function(w) {
    if(w.status==='done'||w.status==='invoiced') {
      var price = parseFloat(w.price)||0;
      var earned = Math.floor(price/10); // 1 نقطة لكل 10 ريال
      points += earned;
      history.push({date:w.date||'—', service:w.service||'—', earned:earned});
    }
  });
  return {points:points, history:history.slice(-5).reverse()};
}

function getTier(points) {
  if(points >= 500) return {name:'بلاتيني 💎', class:'tier-platinum', min:500, max:1000};
  if(points >= 200) return {name:'ذهبي 🥇', class:'tier-gold', min:200, max:500};
  if(points >= 50) return {name:'فضي 🥈', class:'tier-silver', min:50, max:200};
  return {name:'برونزي 🥉', class:'tier-bronze', min:0, max:50};
}

function renderLoyalty(search) {
  var list = document.getElementById('loyaltyList');
  var clients = allClients;
  if(search) {
    search = search.toLowerCase();
    clients = clients.filter(function(c){
      return (c.name||'').toLowerCase().includes(search)||(c.phone||'').includes(search);
    });
  }
  // فرز بالنقاط
  var withPoints = clients.map(function(c){
    var p = calcPoints(c);
    return Object.assign({}, c, {points:p.points, history:p.history});
  }).sort(function(a,b){return b.points-a.points;}).slice(0,20);

  if(withPoints.length === 0) {
    list.innerHTML = '<div class="empty">👥 لا توجد نتائج</div>';
    return;
  }

  list.innerHTML = withPoints.map(function(c,idx) {
    var tier = getTier(c.points);
    var tierProgress = Math.min(100, Math.round(((c.points-tier.min)/(tier.max-tier.min))*100));
    return '<div class="client-loyalty">' +
      '<div class="loyalty-header">' +
        '<div>' +
          (idx<3?['🥇','🥈','🥉'][idx]+' ':'') +
          '<span class="loyalty-name">'+(c.name||'—')+'</span>' +
          '<div style="font-size:11px;color:var(--mist);margin-top:2px;">📱 '+(c.phone||'—')+'</div>' +
        '</div>' +
        '<span class="loyalty-tier '+tier.class+'">'+tier.name+'</span>' +
      '</div>' +
      '<div class="points-display">' +
        '<div class="points-num">'+c.points.toLocaleString('ar')+'</div>' +
        '<div class="points-lbl">نقطة مكافأة</div>' +
      '</div>' +
      '<div style="margin-bottom:10px;">' +
        '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mist);margin-bottom:4px;">' +
          '<span>التقدم نحو المستوى التالي</span><span>'+tierProgress+'%</span>' +
        '</div>' +
        '<div class="progress-bar"><div class="progress-fill" style="width:'+tierProgress+'%;background:linear-gradient(90deg,var(--warning),var(--success))"></div></div>' +
      '</div>' +
      (c.history.length>0 ? '<div class="loyalty-history">' +
        '<div style="font-size:12px;font-weight:700;color:var(--slate);margin-bottom:6px;">آخر المعاملات</div>' +
        c.history.map(function(h){ return '<div class="history-item"><span>'+(h.service||'—')+'</span><span style="color:var(--success);font-weight:700;">+'+h.earned+' نقطة</span></div>'; }).join('') +
        '</div>' : '') +
      '</div>';
  }).join('');
}

function searchLoyalty(val) { renderLoyalty(val); }

// ===== TABS =====
function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

// تشغيل
loadAll();
