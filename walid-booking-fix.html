<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إصلاح حجز وليد — أداة لمرة واحدة</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Tajawal',sans-serif; background:#F0F9FF; color:#0C3B5E; padding:24px; font-size:14px; }
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
.card { background:#fff; border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.card h3 { font-size:15px; font-weight:700; margin-bottom:12px; }
.badge { display:inline-block; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:700; }
.badge-ok   { background:#D1FAE5; color:#065F46; }
.badge-warn { background:#FEF3C7; color:#92400E; }
.badge-err  { background:#FEE2E2; color:#991B1B; }
.row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #F1F5F9; font-size:13px; }
.row:last-child { border-bottom:none; }
.row .lbl { color:#6B7280; }
.row .val { font-weight:600; font-family:monospace; font-size:12px; }
.btn { padding:10px 24px; border:none; border-radius:10px; cursor:pointer; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700; }
.btn-fix  { background:#0C3B5E; color:#fff; }
.btn-fix:hover { background:#0EA5E9; }
.btn-fix:disabled { background:#9CA3AF; cursor:not-allowed; }
.result { padding:16px; border-radius:10px; margin-top:12px; font-size:13px; line-height:1.8; }
.result-ok   { background:#D1FAE5; color:#065F46; border:1.5px solid #6EE7B7; }
.result-err  { background:#FEE2E2; color:#991B1B; border:1.5px solid #FCA5A5; }
.result-warn { background:#FEF3C7; color:#92400E; border:1.5px solid #FDE68A; }
.log { background:#0C3B5E; color:#E2E8F0; padding:14px; border-radius:8px; font-family:monospace; font-size:11px; margin-top:10px; max-height:200px; overflow-y:auto; white-space:pre-wrap; }
.danger-banner { background:#FEE2E2; border:2px solid #EF4444; border-radius:10px; padding:12px 16px; margin-bottom:16px; color:#991B1B; font-weight:700; font-size:13px; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="danger-banner">
  ⚠️ هذه أداة لمرة واحدة فقط — لا تُحذف من GitHub إلا بعد التأكد من اكتمال الإصلاح
</div>

<div class="card">
  <h3>🎯 الهدف: إصلاح حجز وليد دون إنشاء موعد جديد</h3>
  <div class="row"><span class="lbl">رقم الحجز</span><span class="val">ATW-47615</span></div>
  <div class="row"><span class="lbl">الجوال</span><span class="val">0563337956</span></div>
  <div class="row"><span class="lbl">التاريخ</span><span class="val">2026-07-18</span></div>
  <div class="row"><span class="lbl">الوقت</span><span class="val">16:00</span></div>
  <div class="row"><span class="lbl">الخطوات</span><span class="val">بحث → تطابق → تحديث فقط</span></div>
</div>

<div class="card">
  <h3>📊 التشخيص والتنفيذ</h3>
  <div id="statusArea"><div style="color:#6B7280;font-size:13px;">⏳ جاري الاتصال بـ Firebase...</div></div>
  <div id="logArea" class="log" style="display:none;"></div>
</div>

<script>
var BOOKING_REF  = 'ATW-47615';
var WALID_PHONE  = '0563337956';
var WALID_DATE   = '2026-07-18';
var WALID_TIME   = '16:00';

var db = null;
var log = [];

function addLog(msg) {
  log.push(new Date().toLocaleTimeString('ar-SA') + ' — ' + msg);
  var el = document.getElementById('logArea');
  el.style.display = 'block';
  el.textContent = log.join('\n');
  el.scrollTop = el.scrollHeight;
}

function normalizePhone(p) {
  return (p||'').replace(/\s+/g,'').replace(/^00966/,'0').replace(/^\+966/,'0');
}

function setStatus(html) {
  document.getElementById('statusArea').innerHTML = html;
}

// ===== MAIN =====
try {
  firebase.initializeApp({databaseURL:'https://atwad-booking-default-rtdb.firebaseio.com'});
  db = firebase.database();
} catch(e) {
  setStatus('<div class="result result-err">❌ فشل الاتصال بـ Firebase: ' + e.message + '</div>');
}

if (db) runDiagnosis();

function runDiagnosis() {
  addLog('بدء التشخيص...');

  // قراءة bookings و appointments معاً
  var bSnap = null, aSnap = null;
  var done = 0;

  function tryProcess() {
    done++;
    if (done < 2) return;
    processData(bSnap, aSnap);
  }

  db.ref('bookings').once('value', function(snap) {
    bSnap = snap;
    addLog('bookings loaded: ' + snap.numChildren() + ' records');
    tryProcess();
  }, function(e) {
    setStatus('<div class="result result-err">❌ فشل قراءة bookings: ' + e.message + '</div>');
  });

  db.ref('appointments').once('value', function(snap) {
    aSnap = snap;
    addLog('appointments loaded: ' + snap.numChildren() + ' records');
    tryProcess();
  }, function(e) {
    setStatus('<div class="result result-err">❌ فشل قراءة appointments: ' + e.message + '</div>');
  });
}

function processData(bSnap, aSnap) {
  addLog('=== البحث عن حجز وليد ===');

  // STEP 1: البحث في bookings عن ATW-47615
  var bookingKey = null, bookingData = null;
  bSnap.forEach(function(child) {
    var v = child.val();
    if (v.ref === BOOKING_REF) {
      bookingKey  = child.key;
      bookingData = v;
    }
  });

  if (!bookingKey) {
    addLog('❌ لم يُعثر على حجز برقم ' + BOOKING_REF);
    setStatus('<div class="result result-err">❌ لم يُعثر على حجز ' + BOOKING_REF + ' في bookings<br>ربما تم حذفه أو رقم الحجز مختلف.</div>');
    return;
  }

  addLog('✅ وُجد الحجز: key=' + bookingKey);
  addLog('   convertedToAppointment=' + bookingData.convertedToAppointment);
  addLog('   phone=' + bookingData.phone + ' | date=' + bookingData.date + ' | time=' + bookingData.time);

  // STEP 2: هل الحجز محوَّل مسبقاً؟
  if (bookingData.convertedToAppointment === true) {
    addLog('ℹ️ الحجز محوَّل بالفعل — appointmentKey=' + (bookingData.appointmentKey||'غير موجود'));
    setStatus('<div class="result result-warn">ℹ️ الحجز ' + BOOKING_REF + ' محوَّل مسبقاً<br>appointmentKey: ' + (bookingData.appointmentKey||'غير موجود') + '</div>');
    return;
  }

  // STEP 3: البحث في appointments — تطابق آمن: phone + date + time
  addLog('=== البحث في appointments ===');
  var matchedApptKey = null, matchedApptData = null, matchCount = 0;

  aSnap.forEach(function(child) {
    var a = child.val();
    var phoneMatch = normalizePhone(a.phone) === normalizePhone(WALID_PHONE);
    var dateMatch  = a.date === WALID_DATE;
    // الوقت: نقارن بداية الوقت فقط
    var apptTime = (a.time||'').split(' - ')[0].trim();
    var timeMatch  = apptTime === WALID_TIME || (a.time||'').startsWith(WALID_TIME);

    if (phoneMatch && dateMatch && timeMatch) {
      matchCount++;
      matchedApptKey  = child.key;
      matchedApptData = a;
      addLog('✅ موعد مطابق: key=' + child.key + ' | client=' + a.client + ' | date=' + a.date + ' | time=' + a.time);
    }
  });

  addLog('إجمالي المطابقات: ' + matchCount);

  // STEP 4: شرط الأمان — تطابق واحد فقط
  if (matchCount === 0) {
    addLog('❌ لم يُعثر على موعد مطابق — توقف بدون كتابة');
    setStatus('<div class="result result-err">❌ لم يُعثر على موعد مطابق لوليد في appointments<br>يجب التحقق يدوياً قبل أي تعديل.</div>');
    return;
  }

  if (matchCount > 1) {
    addLog('⚠️ وُجدت ' + matchCount + ' مواعيد مطابقة — توقف بدون كتابة');
    setStatus('<div class="result result-warn">⚠️ وُجدت ' + matchCount + ' مواعيد مطابقة — التطابق غير حاسم.<br>يجب المراجعة اليدوية.</div>');
    return;
  }

  // تطابق واحد مؤكد — اعرض نتيجة التشخيص وزر التنفيذ
  showFixButton(bookingKey, bookingData, matchedApptKey, matchedApptData);
}

function showFixButton(bookingKey, bookingData, apptKey, apptData) {
  var html = '<div class="result result-ok" style="margin-bottom:12px;">'
    + '✅ تطابق وحيد ومؤكد — جاهز للإصلاح الآمن'
    + '</div>'

    + '<div style="margin-bottom:12px;">'
    + '<div style="font-weight:700;margin-bottom:8px;color:#0C3B5E;">📋 الحجز المراد تحديثه:</div>'
    + '<div class="row"><span class="lbl">Firebase Key (الداخلي)</span><span class="val">' + bookingKey + '</span></div>'
    + '<div class="row"><span class="lbl">رقم الحجز (ATW)</span><span class="val">' + bookingData.ref + '</span></div>'
    + '<div class="row"><span class="lbl">الاسم</span><span class="val">' + (bookingData.client||bookingData.name||'—') + '</span></div>'
    + '<div class="row"><span class="lbl">convertedToAppointment قبل</span><span class="val">' + (bookingData.convertedToAppointment||'غير موجود') + '</span></div>'
    + '</div>'

    + '<div style="margin-bottom:12px;">'
    + '<div style="font-weight:700;margin-bottom:8px;color:#0C3B5E;">📅 الموعد المطابق:</div>'
    + '<div class="row"><span class="lbl">Firebase Key</span><span class="val">' + apptKey + '</span></div>'
    + '<div class="row"><span class="lbl">الاسم</span><span class="val">' + (apptData.client||'—') + '</span></div>'
    + '<div class="row"><span class="lbl">التاريخ</span><span class="val">' + apptData.date + '</span></div>'
    + '<div class="row"><span class="lbl">الوقت</span><span class="val">' + apptData.time + '</span></div>'
    + '<div class="row"><span class="lbl">sourceBookingKey قبل</span><span class="val">' + (apptData.sourceBookingKey||'غير موجود') + '</span></div>'
    + '</div>'

    + '<div style="background:#FEF3C7;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#92400E;">'
    + '<strong>ما سيتم كتابته:</strong><br>'
    + '• bookings/' + bookingKey + ' ← convertedToAppointment: true, appointmentKey: ' + apptKey + ', convertedAt: [now]<br>'
    + '• appointments/' + apptKey + ' ← sourceBookingKey: ' + bookingKey + ', bookingRef: ' + bookingData.ref
    + '</div>'

    + '<button class="btn btn-fix" id="btnFix" onclick="executeFix(\'' + bookingKey + '\',\'' + apptKey + '\',\'' + (bookingData.ref||'') + '\')">'
    + '✅ تنفيذ الإصلاح الآمن'
    + '</button>'
    + '<div id="fixResult"></div>';

  setStatus(html);
}

function executeFix(bookingKey, apptKey, bookingRef) {
  document.getElementById('btnFix').disabled = true;
  document.getElementById('btnFix').textContent = '⏳ جاري التحديث...';
  addLog('=== بدء التحديث ===');

  var now = new Date().toISOString();

  // تحديث 1: bookings
  db.ref('bookings/' + bookingKey).update({
    convertedToAppointment: true,
    appointmentKey: apptKey,
    convertedAt: now
  }).then(function() {
    addLog('✅ bookings/' + bookingKey + ' — تم التحديث');

    // تحديث 2: appointments — إضافة مرجع الحجز فقط
    return db.ref('appointments/' + apptKey).update({
      sourceBookingKey: bookingKey,
      bookingRef: bookingRef
    });

  }).then(function() {
    addLog('✅ appointments/' + apptKey + ' — تم تحديث المرجع');
    addLog('=== الإصلاح اكتمل ===');

    document.getElementById('fixResult').innerHTML =
      '<div class="result result-ok" style="margin-top:12px;">'
      + '✅ تم تحديث bookings/' + bookingKey + '<br>'
      + '✅ تم تحديث appointments/' + apptKey + '<br>'
      + '✅ convertedToAppointment: true<br>'
      + '✅ appointmentKey: ' + apptKey + '<br>'
      + '<br>افتحي صفحة المواعيد في نافذة خاصة — يجب أن يختفي وليد من «الحجوزات الجديدة».'
      + '</div>';

    document.getElementById('btnFix').textContent = '✅ تم الإصلاح';

  }).catch(function(e) {
    addLog('❌ فشل التحديث: ' + e.message);
    document.getElementById('fixResult').innerHTML =
      '<div class="result result-err" style="margin-top:12px;">❌ فشل التحديث: ' + e.message + '</div>';
    document.getElementById('btnFix').disabled = false;
    document.getElementById('btnFix').textContent = '🔄 إعادة المحاولة';
  });
}
</script>
</body>
</html>
