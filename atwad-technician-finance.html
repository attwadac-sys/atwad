<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أطواد — تسجيل العمليات المالية</title>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
:root{
  --deep:#0C3B5E;--sky:#0EA5E9;--ice:#E8F4FD;--frost:#F0F9FF;
  --success:#10B981;--danger:#EF4444;--warning:#F59E0B;
  --slate:#334155;--mist:#94A3B8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:#F1F5F9;color:var(--slate);min-height:100vh;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--deep),#0e5fa8,var(--sky));padding:16px 20px;text-align:center;}
.header h1{color:#fff;font-size:18px;font-weight:900;margin-bottom:2px;}
.header p{color:rgba(255,255,255,.75);font-size:12px;}

/* FORM CARD */
.card{background:#fff;border-radius:16px;margin:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.card-title{font-size:14px;font-weight:800;color:var(--deep);margin-bottom:16px;display:flex;align-items:center;gap:6px;}

/* نوع العملية */
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.type-btn{padding:14px;border:2px solid #E2E8F0;border-radius:12px;background:#fff;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;color:var(--mist);}
.type-btn.income.sel{border-color:var(--success);background:#D1FAE5;color:var(--success);}
.type-btn.expense.sel{border-color:var(--danger);background:#FEE2E2;color:var(--danger);}
.type-btn:not(.sel):hover{border-color:var(--sky);color:var(--sky);}

/* حقول النموذج */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--slate);margin-bottom:6px;}
.form-group input,
.form-group select,
.form-group textarea{
  width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;
  font-family:'Tajawal',sans-serif;font-size:14px;color:var(--slate);
  background:var(--frost);outline:none;transition:border-color .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{border-color:var(--sky);}
.form-group input[type="number"]{font-weight:700;font-size:18px;color:var(--deep);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.hidden{display:none;}

/* زر الحفظ */
.btn-save{
  width:100%;padding:14px;
  background:linear-gradient(90deg,var(--deep),var(--sky));
  color:#fff;border:none;border-radius:12px;
  font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;margin-top:4px;
  box-shadow:0 4px 14px rgba(14,165,233,.35);
  transition:opacity .2s;
}
.btn-save:hover{opacity:.9;}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}

/* رسالة النجاح */
.success-banner{
  display:none;background:#D1FAE5;border:1.5px solid #6EE7B7;
  border-radius:12px;padding:16px;margin:0 16px 16px;
  text-align:center;
}
.success-banner.show{display:block;}
.success-banner .icon{font-size:32px;margin-bottom:6px;}
.success-banner p{font-size:14px;font-weight:700;color:#065F46;}
.success-banner small{font-size:12px;color:#047857;margin-top:4px;display:block;}

/* Toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--deep);color:#fff;padding:10px 22px;border-radius:10px;
  font-size:13px;font-weight:600;transition:transform .3s;z-index:999;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* سجل اليوم */
.today-list{margin-top:8px;}
.today-item{display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--ice);font-size:13px;}
.today-item:last-child{border-bottom:none;}
.today-item .ti-desc{font-weight:600;color:var(--deep);}
.today-item .ti-meta{font-size:11px;color:var(--mist);margin-top:2px;}
.today-item .ti-amt{font-weight:800;white-space:nowrap;}
.ti-amt.in{color:var(--success);}
.ti-amt.out{color:var(--danger);}

@media(max-width:480px){
  .two-col{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="header">
  <h1>💰 تسجيل العمليات المالية</h1>
  <p>مؤسسة أطواد لصيانة المكيفات</p>
</div>

<!-- رسالة النجاح -->
<div class="success-banner" id="successBanner">
  <div class="icon">✅</div>
  <p id="successText">تم حفظ العملية بنجاح</p>
  <small id="successDetail"></small>
</div>

<!-- النموذج -->
<div class="card">
  <div class="card-title">📋 بيانات العملية</div>

  <!-- نوع العملية -->
  <div class="type-row">
    <button class="type-btn income sel" id="btnIncome" onclick="selType('income')">💵 دخل</button>
    <button class="type-btn expense" id="btnExpense" onclick="selType('expense')">💸 مصروف</button>
  </div>

  <!-- اسم الفني -->
  <div class="form-group">
    <label>👷 الفني</label>
    <select id="f_tech">
      <option value="أحمد">أحمد</option>
      <option value="شعيب">شعيب</option>
      <option value="سهيل">سهيل</option>
    </select>
  </div>

  <!-- التاريخ والمبلغ -->
  <div class="two-col">
    <div class="form-group">
      <label>📅 التاريخ</label>
      <input type="date" id="f_date">
    </div>
    <div class="form-group">
      <label>💵 المبلغ (ريال) *</label>
      <input type="number" id="f_amount" placeholder="0" min="0" inputmode="decimal">
    </div>
  </div>

  <!-- البيان -->
  <div class="form-group">
    <label>📝 البيان / الوصف *</label>
    <input type="text" id="f_desc" placeholder="مثال: تنظيف مكيف — خالد الأحمدي">
  </div>

  <!-- اسم العميل — يظهر عند الدخل فقط -->
  <div class="form-group" id="partyGroup">
    <label>👤 اسم العميل</label>
    <input type="text" id="f_party" placeholder="اختياري">
  </div>

  <!-- فئة المصروف — تظهر عند المصروف فقط -->
  <div class="form-group hidden" id="categoryGroup">
    <label>🗂 فئة المصروف *</label>
    <select id="f_category">
      <option value="قطع غيار">🔩 قطع غيار</option>
      <option value="وقود">⛽ وقود</option>
      <option value="طعام">🍽 طعام</option>
      <option value="إعلانات">📢 إعلانات</option>
      <option value="صيانة سيارة">🚗 صيانة سيارة</option>
      <option value="رواتب">👷 رواتب</option>
      <option value="إيجار">🏠 إيجار</option>
      <option value="تأمين">🛡 تأمين</option>
      <option value="أخرى">📦 أخرى</option>
    </select>
  </div>

  <!-- طريقة الدفع -->
  <div class="form-group">
    <label>💳 طريقة الدفع</label>
    <select id="f_method">
      <option value="كاش">💵 كاش</option>
      <option value="تحويل">🏦 تحويل بنكي</option>
      <option value="مدى">💳 مدى</option>
    </select>
  </div>

  <button class="btn-save" id="btnSave" onclick="saveEntry()">✅ حفظ العملية</button>
</div>

<!-- سجل عمليات اليوم -->
<div class="card">
  <div class="card-title">🗓 عمليات اليوم</div>
  <div class="today-list" id="todayList">
    <div style="text-align:center;padding:20px;color:var(--mist);font-size:13px;">لا توجد عمليات مسجلة اليوم بعد.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Firebase =====
var db = null;
try {
  if(!firebase.apps.length) firebase.initializeApp({databaseURL:'https://atwad-booking-default-rtdb.firebaseio.com'});
  db = firebase.database();
} catch(e){ console.error('Firebase:', e); }

// ===== مساعدات =====
function todayDate() {
  // توقيت السعودية Asia/Riyadh
  return new Intl.DateTimeFormat('en-CA', {timeZone:'Asia/Riyadh'}).format(new Date());
}
function genId() { return 'TF' + Date.now().toString().slice(-8); }
function fmtAmt(n) { return Number(n).toLocaleString('ar-SA-u-ca-gregory'); }
function fmtDate(d) {
  try {
    return new Date(d + 'T00:00:00').toLocaleDateString('ar-SA-u-ca-gregory', {
      weekday:'short', month:'long', day:'numeric', year:'numeric'
    });
  } catch(e) { return d; }
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

// ===== حالة النموذج =====
var currentType = 'income';

function selType(type) {
  currentType = type;
  document.getElementById('btnIncome').classList.toggle('sel', type === 'income');
  document.getElementById('btnExpense').classList.toggle('sel', type === 'expense');
  document.getElementById('partyGroup').classList.toggle('hidden', type !== 'income');
  document.getElementById('categoryGroup').classList.toggle('hidden', type !== 'expense');
}

// ===== حفظ العملية =====
function saveEntry() {
  var amount = parseFloat(document.getElementById('f_amount').value);
  var desc   = document.getElementById('f_desc').value.trim();
  var date   = document.getElementById('f_date').value;
  var tech   = document.getElementById('f_tech').value;
  var method = document.getElementById('f_method').value;

  if(!amount || amount <= 0) { showToast('❌ أدخل مبلغاً صحيحاً'); return; }
  if(!desc)                  { showToast('❌ أدخل البيان');          return; }
  if(!date)                  { showToast('❌ اختر التاريخ');         return; }

  // ===== بنية transaction متوافقة مع atwad-finance.html =====
  var entry = {
    id:          genId(),
    type:        currentType,           // 'income' | 'expense'
    amount:      amount,
    desc:        desc,
    date:        date,                  // YYYY-MM-DD ميلادي
    method:      method,
    status:      'مدفوع',              // الفني يسجل فقط ما تم استلامه/دفعه فعلياً
    paidAmount:  currentType === 'income' ? amount : 0,
    payments:    currentType === 'income'
      ? [{id:'P'+Date.now(), amount:amount, date:date, method:method, note:'تسجيل فني'}]
      : [],
    // حقول المصدر — لا تتعارض مع البيانات الحالية
    source:      'technician',
    createdBy:   tech,
    createdAt:   new Date().toISOString()
  };

  // حقل العميل (للدخل)
  if(currentType === 'income') {
    var party = document.getElementById('f_party').value.trim();
    if(party) entry.party = party;
    entry.category = 'خدمة';
  }

  // فئة المصروف
  if(currentType === 'expense') {
    entry.category = document.getElementById('f_category').value;
    entry.party    = '';
  }

  if(!db) { showToast('❌ Firebase غير متاح'); return; }

  var btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';

  db.ref('transactions').push(entry).then(function() {
    // نجاح
    var typeLabel = currentType === 'income' ? 'دخل' : 'مصروف';
    document.getElementById('successText').textContent = 'تم حفظ الـ' + typeLabel + ' بنجاح ✅';
    document.getElementById('successDetail').textContent =
      fmtAmt(amount) + ' ﷼ — ' + desc + ' — ' + fmtDate(date);
    document.getElementById('successBanner').classList.add('show');
    setTimeout(function(){
      document.getElementById('successBanner').classList.remove('show');
    }, 4000);

    resetForm();
    loadTodayEntries();
  }).catch(function(e) {
    showToast('❌ خطأ في الحفظ: ' + e.message);
  }).finally(function() {
    btn.disabled = false; btn.textContent = '✅ حفظ العملية';
  });
}

// ===== إعادة تعيين النموذج =====
function resetForm() {
  document.getElementById('f_amount').value = '';
  document.getElementById('f_desc').value   = '';
  document.getElementById('f_party').value  = '';
  document.getElementById('f_date').value   = todayDate();
  document.getElementById('f_method').value = 'كاش';
  selType('income');
  document.getElementById('f_amount').focus();
}

// ===== سجل عمليات اليوم =====
function loadTodayEntries() {
  if(!db) return;
  var today = todayDate();
  var tech  = document.getElementById('f_tech').value;

  db.ref('transactions').orderByChild('date').equalTo(today).once('value', function(snap) {
    var items = [];
    snap.forEach(function(c) {
      var v = c.val();
      // عرض عمليات الفني الحالي فقط من مصدر technician
      if(v.source === 'technician' && v.createdBy === tech) {
        items.push(v);
      }
    });

    items.sort(function(a, b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });

    var list = document.getElementById('todayList');
    if(!items.length) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--mist);font-size:13px;">لا توجد عمليات مسجلة اليوم بعد.</div>';
      return;
    }

    list.innerHTML = items.map(function(v) {
      var isIncome = v.type === 'income';
      return '<div class="today-item">' +
        '<div>' +
          '<div class="ti-desc">' + (v.desc||'—') + '</div>' +
          '<div class="ti-meta">' + (v.method||'كاش') + (v.party ? ' · ' + v.party : '') + '</div>' +
        '</div>' +
        '<div class="ti-amt ' + (isIncome?'in':'out') + '">' +
          (isIncome ? '+' : '-') + fmtAmt(v.amount) + ' ﷼' +
        '</div>' +
      '</div>';
    }).join('');
  });
}

// ===== تهيئة الصفحة =====
document.getElementById('f_date').value = todayDate();

// إعادة تحميل عمليات اليوم عند تغيير الفني
document.getElementById('f_tech').addEventListener('change', function() {
  loadTodayEntries();
});

loadTodayEntries();
</script>
</body>
</html>
